<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
</head>
<body>
    <h2>Scan History</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>Risk Score</th>
            <th>Reasons</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
