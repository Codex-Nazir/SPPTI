<!DOCTYPE html>
<html>
<head>
    <title>SPPTI</title>

    <style>

#chatbot-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
}

#chatbot-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    background: #1e293b;
    border-radius: 10px;
    display: none;
    flex-direction: column;
}

#chat-header {
    background: #020617;
    padding: 10px;
    color: #38bdf8;
    text-align: center;
}

#chat-messages {
    height: 200px;
    overflow-y: auto;
    padding: 10px;
}

#chat-input {
    width: 70%;
    margin: 5px;
}

#chatbot-box button {
    width: 25%;
}


        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #38bdf8;
        }

        /* Container */
        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        /* Card */
        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h3 {
            color: #38bdf8;
        }

        input, textarea {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        /* Result box */
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        .safe {
            background: #065f46;
        }

        .danger {
            background: #7f1d1d;
        }

        ul {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    🛡️ SPPTI - Cyber Threat Detection System
</div>

<div class="container">

    <!-- URL Checker -->
    <div class="card">
        <h3>🔗 URL Phishing Checker</h3>
        <input type="text" id="url" placeholder="Enter URL">
        <button onclick="checkURL()">Check URL</button>

        <div id="url_result" class="result"></div>
        <ul id="reasons"></ul>
    </div>

    <!-- Email Checker -->
    <div class="card">
        <h3>📧 Email Phishing Checker</h3>
        <textarea id="email" rows="5" placeholder="Paste email content"></textarea>
        <button onclick="checkEmail()">Check Email</button>

        <div id="email_result" class="result"></div>
        <ul id="email_reasons"></ul>
    </div>
  
    <div class="card">
    <h3>📷 QR Code Scanner</h3>

    <input type="file" id="qrfile">
    <button onclick="scanQR()">Scan QR</button>

    <div id="qr_result" class="result"></div>
    <ul id="qr_details"></ul>
</div>
</div>

<script>
function checkURL() {
    let url = document.getElementById("url").value;

    fetch("/check", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: url})
    })
    .then(res => res.json())
    .then(data => {
        let resultBox = document.getElementById("url_result");

        if (data.risk_score > 1) {
            resultBox.className = "result danger";
        } else {
            resultBox.className = "result safe";
        }

        resultBox.innerHTML = "<b>Risk Score:</b> " + data.risk_score;

        let list = document.getElementById("reasons");
        list.innerHTML = "";

        data.reasons.forEach(r => {
            let li = document.createElement("li");
            li.innerText = r;
            list.appendChild(li);
        });
    });
}

function checkEmail() {
    let email = document.getElementById("email").value;

    fetch("/check_email", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email: email})
    })
    .then(res => res.json())
    .then(data => {
        let resultBox = document.getElementById("email_result");

        if (data.risk_score > 1) {
            resultBox.className = "result danger";
        } else {
            resultBox.className = "result safe";
        }

        resultBox.innerHTML = "<b>Email Risk Score:</b> " + data.risk_score;

        let list = document.getElementById("email_reasons");
        list.innerHTML = "";

        data.reasons.forEach(r => {
            let li = document.createElement("li");
            li.innerText = r;
            list.appendChild(li);
        });
    });
}

document.addEventListener("DOMContentLoaded", function () {

    // Toggle chatbot
    document.getElementById("chatbot-btn").onclick = function () {
        let box = document.getElementById("chatbot-box");

        if (box.style.display === "flex") {
            box.style.display = "none";
        } else {
            box.style.display = "flex";
        }
    };

});

// Send message
function sendMessage() {
    let input = document.getElementById("chat-input");
    let message = input.value;

    let chat = document.getElementById("chat-messages");

    // Show user message
    chat.innerHTML += "<p><b>You:</b> " + message + "</p>";

    input.value = "";

    // Detect URL in message
    let urlPattern = /(https?:\/\/[^\s]+)/g;
    let foundUrl = message.match(urlPattern);

    if (foundUrl) {

        fetch("/check", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({url: foundUrl[0]})
        })
        .then(res => res.json())
        .then(data => {

            chat.innerHTML += `
                <p><b>Bot:</b> 🔍 URL Analysis</p>
                <p>Risk Score: ${data.risk_score}</p>
                <p>AI Confidence: ${data.ml_confidence}%</p>
            `;
        });

    } else {
        let reply = smartReply(message);
        chat.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";
    }
}


// Smart bot logic
function smartReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("phishing")) {
        return "Phishing is a cyber attack where attackers trick users into giving sensitive data.";
    }

    if (msg.includes("how to detect")) {
        return "Check HTTPS, domain age, suspicious words, and unknown links.";
    }

    if (msg.includes("safe")) {
        return "Paste a URL here and I will analyze it for you 🔍";
    }

    if (msg.includes("email")) {
        return "Use the email checker above to analyze suspicious emails.";
    }

    if (msg.includes("hello") || msg.includes("hi")) {
        return "Hello 👋 I am your SPPTI AI assistant!";
    }

    return "🤖 I am learning... Try asking about phishing or paste a URL.";
}

function scanQR() {
    let fileInput = document.getElementById("qrfile");
    let file = fileInput.files[0];

    let formData = new FormData();
    formData.append("file", file);

    fetch("/scan_qr", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let resultBox = document.getElementById("qr_result");
        let list = document.getElementById("qr_details");

        if (data.error) {
            resultBox.innerText = data.error;
            return;
        }

        resultBox.innerHTML = `
            <b>Type:</b> ${data.type} <br>
            <b>Risk:</b> ${data.risk} <br>
            <b>Data:</b> ${data.data}
        `;

        list.innerHTML = "";

        data.details.forEach(d => {
            let li = document.createElement("li");
            li.innerText = d;
            list.appendChild(li);
        });
    });
}



</script>

<!-- Chatbot Button -->
<div id="chatbot-btn">💬</div>

<!-- Chatbot Box -->
<div id="chatbot-box">
    <div id="chat-header">SPPTI Assistant</div>
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>
</body>
</html>
